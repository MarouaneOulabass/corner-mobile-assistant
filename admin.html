<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Corner Mobile - Gestion Stock</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2AA8DC;--green:#5BBF3E;--dark:#080c0f;--card:#131b21;--card2:#1a2430;--border:rgba(42,168,220,0.12);--text:#e2eaf0;--muted:#4a6070;--red:#DC3C2A;--yellow:#f59e0b;--orange:#F97316}
html,body{min-height:100vh;background:var(--dark);color:var(--text);font-family:'DM Mono',monospace}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(42,168,220,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(42,168,220,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

.lock-screen{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:30px}
.lock-screen.hidden{display:none}
.lock-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
.lock-logo .c1{color:var(--blue)}.lock-logo .c2{color:var(--green)}
.lock-sub{color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase}
.lock-input{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;width:min(300px,80vw);text-align:center;outline:none}
.lock-input:focus{border-color:rgba(42,168,220,0.5)}
.lock-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:14px 40px;font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;font-weight:500}
.lock-error{color:var(--red);font-size:12px;min-height:18px}

.app{display:none;position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:16px 16px 60px}
.app.visible{display:block}

header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.logo .c1{color:var(--blue)}.logo .c2{color:var(--green)}
.logo-tag{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px}
.header-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:8px;border:none;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:opacity 0.2s;white-space:nowrap}
.btn:hover{opacity:0.85}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:rgba(220,60,42,0.15);border:1px solid rgba(220,60,42,0.3);color:var(--red)}
.btn-muted{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.btn-orange{background:var(--orange);color:#fff}

/* Stats */
.stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px}
.stat-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:500;color:var(--blue)}
.stat-value.green{color:var(--green)}
.stat-value.orange{color:var(--orange)}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.search-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;flex:1;min-width:200px}
.search-input:focus{border-color:rgba(42,168,220,0.4)}
.filter-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;-webkit-appearance:none;cursor:pointer;min-width:100px}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:1000px}
th{position:sticky;top:0;background:rgba(42,168,220,0.08);text-align:left;padding:10px 8px;color:var(--blue);font-size:9px;text-transform:uppercase;letter-spacing:1px;font-weight:500;cursor:pointer;user-select:none;white-space:nowrap;z-index:2}
th:hover{background:rgba(42,168,220,0.15)}
th.sorted-asc::after{content:' ▲';font-size:8px}
th.sorted-desc::after{content:' ▼';font-size:8px}
td{padding:6px 8px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(42,168,220,0.04)}
tr.inactive td{opacity:0.4}

td input,td select{background:transparent;border:1px solid transparent;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:3px 4px;border-radius:4px;width:100%;outline:none}
td input:hover,td select:hover{border-color:var(--border)}
td input:focus,td select:focus{border-color:rgba(42,168,220,0.5);background:var(--card2)}
td input[type="number"]{width:70px;text-align:right}
td .stock-input{width:40px;text-align:center}

.toggle-sm{position:relative;width:32px;height:18px;display:inline-block}
.toggle-sm input{opacity:0;width:0;height:0}
.toggle-sm span{position:absolute;inset:0;background:#1a2a35;border-radius:18px;transition:.2s;cursor:pointer}
.toggle-sm span:before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.2s}
.toggle-sm input:checked+span{background:rgba(91,191,62,0.3)}
.toggle-sm input:checked+span:before{transform:translateX(14px);background:var(--green)}

.row-actions{display:flex;gap:4px}
.btn-xs{padding:3px 6px;border-radius:4px;border:none;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace}
.btn-del{background:rgba(220,60,42,0.1);color:var(--red)}
.btn-dup{background:rgba(42,168,220,0.1);color:var(--blue)}

.empty-msg{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* Add form */
.add-form{display:none;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.add-form.open{display:block}
.add-form h4{font-family:'Syne',sans-serif;font-size:13px;color:var(--blue);margin-bottom:12px}
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:end}
.add-field{display:flex;flex-direction:column;gap:3px}
.add-field label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.add-field input,.add-field select{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;min-width:100px}
.add-field input:focus,.add-field select:focus{border-color:rgba(42,168,220,0.5)}

/* Import modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.modal h3{font-family:'Syne',sans-serif;font-size:16px;color:var(--blue);margin-bottom:12px}
.modal textarea{width:100%;height:200px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:11px;color:var(--muted)}
.page-btns{display:flex;gap:4px}
.page-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}
.page-btn.active{background:rgba(42,168,220,0.15);border-color:rgba(42,168,220,0.4);color:var(--blue)}
.page-btn:hover{border-color:rgba(42,168,220,0.3)}

.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:12px;z-index:600;animation:toastIn 0.3s ease;color:#fff}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-logo"><span class="c1">Corner</span><span class="c2">Mobile</span></div>
  <div class="lock-sub">Gestion Stock</div>
  <input class="lock-input" id="lockPass" type="password" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')checkPassword()">
  <button class="lock-btn" onclick="checkPassword()">Entrer</button>
  <div class="lock-error" id="lockError"></div>
</div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>Importer un CSV</h3>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">Collez le contenu CSV (separateur <code>;</code>) ou chargez un fichier.</p>
    <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px;font-size:11px;color:var(--muted)">
    <textarea id="csvInput" placeholder="marque;modele;stockage;etat;couleur;batterie;prix_achat;prix_vente;stock_m1;stock_m2;actif"></textarea>
    <div class="modal-btns">
      <button class="btn btn-muted" onclick="closeImport()">Annuler</button>
      <button class="btn btn-blue" onclick="doImport()">Importer</button>
    </div>
  </div>
</div>

<div class="app" id="app">
  <header>
    <div>
      <span class="logo"><span class="c1">Corner</span><span class="c2">Mobile</span></span>
      <span class="logo-tag">gestion stock</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-green" onclick="toggleAddForm()">+ Ajouter</button>
      <button class="btn btn-blue" onclick="openImport()">Importer CSV</button>
      <button class="btn btn-orange" onclick="exportCSV()">Exporter CSV</button>
      <button class="btn btn-muted" onclick="saveToStorage()">Sauvegarder</button>
      <button class="btn btn-muted" onclick="resetFromCSV()">Recharger CSV</button>
    </div>
  </header>

  <div class="stats" id="statsBar"></div>

  <div class="add-form" id="addForm">
    <h4>Ajouter un produit</h4>
    <div class="add-row">
      <div class="add-field"><label>Marque</label><select id="addMarque"><option>Apple</option><option>Samsung</option><option>Xiaomi</option><option>Oppo</option><option>Google</option><option>OnePlus</option><option>Nothing</option><option>Huawei</option></select></div>
      <div class="add-field"><label>Modele</label><input id="addModele" placeholder="iPhone 16 Pro"></div>
      <div class="add-field"><label>Stockage</label><select id="addStockage"><option>64 Go</option><option>128 Go</option><option>256 Go</option><option>512 Go</option><option>1 To</option></select></div>
      <div class="add-field"><label>Etat</label><select id="addEtat"><option>Neuf</option><option>Excellent</option><option>Tres bon</option><option>Bon</option></select></div>
      <div class="add-field"><label>Couleur</label><input id="addCouleur" placeholder="Noir"></div>
      <div class="add-field"><label>Batterie %</label><input id="addBatt" type="number" value="100" min="0" max="100" style="width:60px"></div>
      <div class="add-field"><label>Prix achat</label><input id="addPA" type="number" placeholder="3000" style="width:80px"></div>
      <div class="add-field"><label>Prix vente</label><input id="addPV" type="number" placeholder="4000" style="width:80px"></div>
      <div class="add-field"><label>M1</label><input id="addM1" type="number" value="1" min="0" style="width:45px"></div>
      <div class="add-field"><label>M2</label><input id="addM2" type="number" value="1" min="0" style="width:45px"></div>
      <button class="btn btn-green" onclick="addProduct()" style="align-self:flex-end;margin-bottom:1px">Ajouter</button>
    </div>
  </div>

  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="Rechercher (modele, marque, couleur...)" oninput="applyFilters()">
    <select class="filter-select" id="filterMarque" onchange="applyFilters()"><option value="">Toutes marques</option></select>
    <select class="filter-select" id="filterEtat" onchange="applyFilters()">
      <option value="">Tous etats</option><option>Neuf</option><option>Excellent</option><option>Tres bon</option><option>Bon</option>
    </select>
    <select class="filter-select" id="filterStock" onchange="applyFilters()">
      <option value="">Tout stock</option><option value="instock">En stock</option><option value="out">Rupture</option>
    </select>
    <select class="filter-select" id="filterActif" onchange="applyFilters()">
      <option value="">Actif + inactif</option><option value="oui">Actif</option><option value="non">Inactif</option>
    </select>
  </div>

  <div class="table-wrap" style="max-height:calc(100vh - 320px);overflow-y:auto">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('marque')">Marque</th>
          <th onclick="sortBy('modele')">Modele</th>
          <th onclick="sortBy('stockage')">Stockage</th>
          <th onclick="sortBy('etat')">Etat</th>
          <th onclick="sortBy('couleur')">Couleur</th>
          <th onclick="sortBy('batterie')">Batt%</th>
          <th onclick="sortBy('prix_achat')">P.Achat</th>
          <th onclick="sortBy('prix_vente')">P.Vente</th>
          <th onclick="sortBy('_marge')">Marge</th>
          <th onclick="sortBy('stock_m1')">M1</th>
          <th onclick="sortBy('stock_m2')">M2</th>
          <th>Actif</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
const PASSWORD_HASH = '438abe17717f5a9cfebbe58a52ec720924e0a7f9c46663b8ba9f0410f12acfbe';
async function hashSHA256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const COLS = ['marque','modele','stockage','etat','couleur','batterie','prix_achat','prix_vente','stock_m1','stock_m2','actif'];
const NUM_COLS = ['batterie','prix_achat','prix_vente','stock_m1','stock_m2'];
let data = [];
let filtered = [];
let sortCol = 'marque';
let sortDir = 'asc';
let currentPage = 0;
const PAGE_SIZE = 50;
let unsaved = false;

// ============================================================
// AUTH
// ============================================================
async function checkPassword() {
  const hash = await hashSHA256(document.getElementById('lockPass').value);
  if (hash === PASSWORD_HASH) {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    sessionStorage.setItem('cm_admin_auth', '1');
    initAdmin();
  } else {
    document.getElementById('lockError').textContent = 'Mot de passe incorrect';
    document.getElementById('lockPass').value = '';
  }
}
window.onload = () => {
  if (sessionStorage.getItem('cm_admin_auth') === '1') {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initAdmin();
  }
  document.getElementById('lockPass').focus();
};

// ============================================================
// INIT
// ============================================================
async function initAdmin() {
  // Try localStorage first, then CSV file
  const stored = localStorage.getItem('cm_stock');
  if (stored) {
    data = JSON.parse(stored);
    toast('Stock charge depuis sauvegarde locale (' + data.length + ' produits)', 'ok');
  } else {
    await loadCSVFile();
  }
  populateFilters();
  applyFilters();
}

async function loadCSVFile() {
  try {
    const r = await fetch('stock.csv?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    data = parseCSV(text);
    toast('stock.csv charge : ' + data.length + ' produits', 'ok');
  } catch (e) {
    toast('Erreur chargement stock.csv: ' + e.message, 'err');
    data = [];
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(';').map(h => h.trim());
  return lines.slice(1).map((line, idx) => {
    const vals = line.split(';');
    const obj = { _id: idx };
    headers.forEach((h, i) => {
      let v = (vals[i] || '').trim();
      if (NUM_COLS.includes(h)) v = parseFloat(v) || 0;
      obj[h] = v;
    });
    return obj;
  });
}

// ============================================================
// FILTERS & SORT
// ============================================================
function populateFilters() {
  const marques = [...new Set(data.map(d => d.marque))].sort();
  const sel = document.getElementById('filterMarque');
  sel.innerHTML = '<option value="">Toutes marques</option>' + marques.map(m => '<option>' + m + '</option>').join('');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fm = document.getElementById('filterMarque').value;
  const fe = document.getElementById('filterEtat').value;
  const fs = document.getElementById('filterStock').value;
  const fa = document.getElementById('filterActif').value;

  filtered = data.filter(d => {
    if (fm && d.marque !== fm) return false;
    if (fe && d.etat !== fe) return false;
    if (fa && d.actif !== fa) return false;
    if (fs === 'instock' && (d.stock_m1 || 0) + (d.stock_m2 || 0) === 0) return false;
    if (fs === 'out' && (d.stock_m1 || 0) + (d.stock_m2 || 0) > 0) return false;
    if (q) {
      const str = (d.marque + ' ' + d.modele + ' ' + d.stockage + ' ' + d.couleur + ' ' + d.etat).toLowerCase();
      if (!str.includes(q)) return false;
    }
    return true;
  });

  doSort();
  currentPage = 0;
  render();
}

function sortBy(col) {
  if (col === '_marge') {
    // Virtual column
    if (sortCol === '_marge') sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = '_marge'; sortDir = 'desc'; }
  } else {
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = 'asc'; }
  }
  doSort();
  render();
}

function doSort() {
  filtered.sort((a, b) => {
    let va, vb;
    if (sortCol === '_marge') {
      va = a.prix_vente > 0 && a.prix_achat > 0 ? (a.prix_vente - a.prix_achat) / a.prix_vente * 100 : 0;
      vb = b.prix_vente > 0 && b.prix_achat > 0 ? (b.prix_vente - b.prix_achat) / b.prix_vente * 100 : 0;
    } else {
      va = a[sortCol]; vb = b[sortCol];
    }
    if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
    return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
}

// ============================================================
// RENDER
// ============================================================
function render() {
  updateStats();
  renderTable();
  renderPagination();
  updateSortHeaders();
}

function updateStats() {
  const total = data.length;
  const actif = data.filter(d => d.actif === 'oui').length;
  const inStock = data.filter(d => (d.stock_m1 || 0) + (d.stock_m2 || 0) > 0 && d.actif === 'oui').length;
  const marques = new Set(data.map(d => d.marque)).size;
  const avgPrice = data.filter(d => d.prix_vente > 0).reduce((s, d) => s + d.prix_vente, 0) / (data.filter(d => d.prix_vente > 0).length || 1);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-label">Total produits</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Actifs</div><div class="stat-value green">${actif}</div></div>
    <div class="stat"><div class="stat-label">En stock</div><div class="stat-value orange">${inStock}</div></div>
    <div class="stat"><div class="stat-label">Marques</div><div class="stat-value">${marques}</div></div>
    <div class="stat"><div class="stat-label">Prix moyen</div><div class="stat-value">${Math.round(avgPrice)} MAD</div></div>
    <div class="stat"><div class="stat-label">Affiches</div><div class="stat-value">${filtered.length}</div></div>
  `;
}

function renderTable() {
  const start = currentPage * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tbody');

  if (page.length === 0) {
    tbody.innerHTML = '<tr><td colspan="13" class="empty-msg">Aucun produit trouve</td></tr>';
    return;
  }

  tbody.innerHTML = page.map((d, pi) => {
    const idx = data.indexOf(d);
    const marge = d.prix_vente > 0 && d.prix_achat > 0 ? Math.round((d.prix_vente - d.prix_achat) / d.prix_vente * 100) : 0;
    const margeColor = marge >= 25 ? 'var(--green)' : marge >= 15 ? 'var(--yellow)' : 'var(--red)';
    const inactive = d.actif !== 'oui' ? ' class="inactive"' : '';
    return `<tr${inactive}>
      <td><select onchange="upd(${idx},'marque',this.value)">
        ${['Apple','Samsung','Xiaomi','Oppo','Google','OnePlus','Nothing','Huawei','Autre'].map(m => `<option${d.marque===m?' selected':''}>${m}</option>`).join('')}
      </select></td>
      <td><input value="${esc(d.modele)}" onchange="upd(${idx},'modele',this.value)"></td>
      <td><select onchange="upd(${idx},'stockage',this.value)">
        ${['64 Go','128 Go','256 Go','512 Go','1 To'].map(s => `<option${d.stockage===s?' selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><select onchange="upd(${idx},'etat',this.value)">
        ${['Neuf','Excellent','Tres bon','Bon'].map(e => `<option${d.etat===e?' selected':''}>${e}</option>`).join('')}
      </select></td>
      <td><input value="${esc(d.couleur)}" onchange="upd(${idx},'couleur',this.value)"></td>
      <td><input type="number" class="stock-input" value="${d.batterie}" min="0" max="100" onchange="upd(${idx},'batterie',+this.value)"></td>
      <td><input type="number" value="${d.prix_achat}" onchange="upd(${idx},'prix_achat',+this.value)"></td>
      <td><input type="number" value="${d.prix_vente}" onchange="upd(${idx},'prix_vente',+this.value)"></td>
      <td style="color:${margeColor};font-weight:500;text-align:right">${marge}%</td>
      <td><input type="number" class="stock-input" value="${d.stock_m1}" min="0" onchange="upd(${idx},'stock_m1',+this.value)"></td>
      <td><input type="number" class="stock-input" value="${d.stock_m2}" min="0" onchange="upd(${idx},'stock_m2',+this.value)"></td>
      <td><label class="toggle-sm"><input type="checkbox" ${d.actif==='oui'?'checked':''} onchange="upd(${idx},'actif',this.checked?'oui':'non')"><span></span></label></td>
      <td><div class="row-actions">
        <button class="btn-xs btn-dup" onclick="dupRow(${idx})" title="Dupliquer">+</button>
        <button class="btn-xs btn-del" onclick="delRow(${idx})" title="Supprimer">x</button>
      </div></td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  const start = currentPage * PAGE_SIZE + 1;
  const end = Math.min((currentPage + 1) * PAGE_SIZE, filtered.length);
  let html = `<span>${start}-${end} sur ${filtered.length}</span><div class="page-btns">`;
  for (let i = 0; i < totalPages; i++) {
    html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
  }
  html += '</div>';
  document.getElementById('pagination').innerHTML = html;
}

function updateSortHeaders() {
  document.querySelectorAll('th').forEach(th => { th.className = ''; });
  const thMap = {marque:0,modele:1,stockage:2,etat:3,couleur:4,batterie:5,prix_achat:6,prix_vente:7,_marge:8,stock_m1:9,stock_m2:10};
  const idx = thMap[sortCol];
  if (idx !== undefined) {
    document.querySelectorAll('th')[idx].className = 'sorted-' + sortDir;
  }
}

function goPage(p) { currentPage = p; renderTable(); renderPagination(); document.querySelector('.table-wrap').scrollTop = 0; }

// ============================================================
// EDIT ACTIONS
// ============================================================
function upd(idx, col, val) {
  data[idx][col] = val;
  unsaved = true;
  // Re-render only stats and current row marge
  updateStats();
  // Auto-save to localStorage
  saveToStorage(true);
}

function delRow(idx) {
  if (!confirm('Supprimer ce produit ?')) return;
  data.splice(idx, 1);
  unsaved = true;
  applyFilters();
  saveToStorage(true);
}

function dupRow(idx) {
  const copy = { ...data[idx], _id: data.length };
  data.splice(idx + 1, 0, copy);
  unsaved = true;
  applyFilters();
  saveToStorage(true);
}

function addProduct() {
  const product = {
    _id: data.length,
    marque: document.getElementById('addMarque').value,
    modele: document.getElementById('addModele').value,
    stockage: document.getElementById('addStockage').value,
    etat: document.getElementById('addEtat').value,
    couleur: document.getElementById('addCouleur').value,
    batterie: +document.getElementById('addBatt').value || 100,
    prix_achat: +document.getElementById('addPA').value || 0,
    prix_vente: +document.getElementById('addPV').value || 0,
    stock_m1: +document.getElementById('addM1').value || 0,
    stock_m2: +document.getElementById('addM2').value || 0,
    actif: 'oui'
  };
  if (!product.modele) { toast('Modele requis', 'err'); return; }
  data.unshift(product);
  document.getElementById('addModele').value = '';
  document.getElementById('addCouleur').value = '';
  applyFilters();
  saveToStorage(true);
  toast('Produit ajoute', 'ok');
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('open');
}

// ============================================================
// SAVE / EXPORT / IMPORT
// ============================================================
function saveToStorage(silent) {
  localStorage.setItem('cm_stock', JSON.stringify(data));
  if (!silent) toast('Sauvegarde locale OK (' + data.length + ' produits)', 'ok');
}

function exportCSV() {
  const header = COLS.join(';');
  const rows = data.map(d => COLS.map(c => d[c] ?? '').join(';'));
  const content = '\uFEFF' + header + '\n' + rows.join('\n');
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stock_corner_mobile_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exporte', 'ok');
}

function openImport() { document.getElementById('importModal').classList.add('open'); }
function closeImport() { document.getElementById('importModal').classList.remove('open'); }

document.getElementById('csvFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { document.getElementById('csvInput').value = ev.target.result; };
  reader.readAsText(file, 'utf-8');
});

function doImport() {
  const text = document.getElementById('csvInput').value.trim();
  if (!text) { toast('CSV vide', 'err'); return; }
  const imported = parseCSV(text);
  if (imported.length === 0) { toast('Aucun produit dans le CSV', 'err'); return; }
  if (confirm('Remplacer les ' + data.length + ' produits par ' + imported.length + ' importes ?')) {
    data = imported;
  } else {
    data = data.concat(imported);
  }
  closeImport();
  populateFilters();
  applyFilters();
  saveToStorage(true);
  toast(imported.length + ' produits importes', 'ok');
}

async function resetFromCSV() {
  if (!confirm('Recharger stock.csv depuis le serveur ? Les modifications non exportees seront perdues.')) return;
  localStorage.removeItem('cm_stock');
  await loadCSVFile();
  populateFilters();
  applyFilters();
}

// ============================================================
// UTILS
// ============================================================
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
