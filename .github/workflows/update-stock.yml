name: Update Stock from Loyverse

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and build catalogue
        env:
          LOYVERSE_TOKEN: ${{ secrets.LOYVERSE_TOKEN }}
        run: |
          set -e

          # 1. Fetch all items
          echo "Fetching items..."
          ALL_ITEMS="[]"
          CURSOR=""
          PAGE=0
          while true; do
            URL="https://api.loyverse.com/v1.0/items?limit=250"
            [ -n "$CURSOR" ] && URL="${URL}&cursor=${CURSOR}"
            RESPONSE=$(curl -sf -H "Authorization: Bearer $LOYVERSE_TOKEN" "$URL")
            ITEMS=$(echo "$RESPONSE" | jq '.items // []')
            COUNT=$(echo "$ITEMS" | jq 'length')
            echo "  Page $PAGE: $COUNT items"
            ALL_ITEMS=$(echo "$ALL_ITEMS" "$ITEMS" | jq -s '.[0] + .[1]')
            CURSOR=$(echo "$RESPONSE" | jq -r '.cursor // empty')
            [ -z "$CURSOR" ] && break
            PAGE=$((PAGE + 1))
            [ $PAGE -ge 20 ] && break
          done
          echo "Total: $(echo "$ALL_ITEMS" | jq 'length') items"

          # 2. Fetch inventory
          echo "Fetching inventory..."
          INV_M1=$(curl -sf -H "Authorization: Bearer $LOYVERSE_TOKEN" \
            "https://api.loyverse.com/v1.0/inventory?store_id=f8ed77ef-df1b-46b8-9e7d-edb2acadc720&limit=250" \
            | jq '.inventory_levels // []')
          INV_M2=$(curl -sf -H "Authorization: Bearer $LOYVERSE_TOKEN" \
            "https://api.loyverse.com/v1.0/inventory?store_id=ed81c93c-e9d4-4a59-9ddb-e2b08fc39ed6&limit=250" \
            | jq '.inventory_levels // []')
          echo "  M1: $(echo "$INV_M1" | jq 'length') levels"
          echo "  M2: $(echo "$INV_M2" | jq 'length') levels"

          # 3. Save to temp files FIRST
          echo "$ALL_ITEMS" > /tmp/items.json
          echo "$INV_M1" > /tmp/inv_m1.json
          echo "$INV_M2" > /tmp/inv_m2.json

          # 4. Build catalogue.json with Python
          python3 << 'EOF'
          import json
          from datetime import datetime, timezone

          with open('/tmp/items.json') as f:
              items = json.load(f)
          with open('/tmp/inv_m1.json') as f:
              inv_m1 = {x['variant_id']: x['in_stock'] for x in json.load(f)}
          with open('/tmp/inv_m2.json') as f:
              inv_m2 = {x['variant_id']: x['in_stock'] for x in json.load(f)}

          grouped = {}
          for item in items:
              name = item['item_name']
              desc = item.get('description', '')
              variant = (item.get('variants') or [{}])[0]
              vid = variant.get('variant_id', '')
              stores = variant.get('stores', [])
              price_m1 = price_m2 = None
              avail_m1 = avail_m2 = False
              for s in stores:
                  sid = s.get('store_id', '')
                  if 'f8ed77ef' in sid:
                      price_m1 = s.get('price')
                      avail_m1 = s.get('available_for_sale', False)
                  elif 'ed81c93c' in sid:
                      price_m2 = s.get('price')
                      avail_m2 = s.get('available_for_sale', False)
              stock_m1 = inv_m1.get(vid, 0)
              stock_m2 = inv_m2.get(vid, 0)
              default_price = variant.get('default_price', 0)
              cost = variant.get('cost', 0)
              if name not in grouped:
                  grouped[name] = {'nom': name, 'description': desc, 'prix': default_price,
                      'prix_m1': price_m1, 'prix_m2': price_m2, 'cout': cost,
                      'stock_m1': 0, 'stock_m2': 0, 'dispo': False}
              g = grouped[name]
              g['stock_m1'] += max(stock_m1, 1 if avail_m1 else 0)
              g['stock_m2'] += max(stock_m2, 1 if avail_m2 else 0)
              if price_m1 and (price_m1 < g['prix'] or g['prix'] == 0): g['prix'] = price_m1
              if price_m2 and (price_m2 < g['prix'] or g['prix'] == 0): g['prix'] = price_m2
              if avail_m1 or avail_m2 or stock_m1 > 0 or stock_m2 > 0: g['dispo'] = True

          catalogue = {
              'updated': datetime.now(timezone.utc).isoformat(),
              'stores': {'M1': 'Centre Commercial Ait Baha, Rabat', 'M2': 'Centre Commercial Oued Dahab (9isaria), Rabat'},
              'appareils': sorted(grouped.values(), key=lambda x: x['nom'])
          }
          with open('catalogue.json', 'w', encoding='utf-8') as f:
              json.dump(catalogue, f, ensure_ascii=False, indent=2)
          dispo = sum(1 for x in grouped.values() if x['dispo'])
          print(f"Catalogue: {len(grouped)} products, {dispo} available")
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add catalogue.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update stock [$(date -u +%H:%M)]"
            git push
          fi
