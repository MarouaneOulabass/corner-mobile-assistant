<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Corner Mobile — Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#2AA8DC;--green:#5BBF3E;--dark:#080c0f;--card:#131b21;--border:rgba(42,168,220,0.12);--text:#e2eaf0;--muted:#4a6070}
body{background:var(--dark);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(42,168,220,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(42,168,220,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
header{position:relative;z-index:10;padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,12,15,0.97);flex-shrink:0}
.logo{font-family:'Clash Display',sans-serif;font-size:18px;font-weight:700}
.logo .c1{color:var(--blue)}.logo .c2{color:var(--green)}
.header-right{display:flex;align-items:center;gap:12px}
.status{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status-dot.loading{background:#f59e0b;animation:pulse 0.6s infinite}
.status-dot.error{background:#DC3C2A;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn-settings{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--muted);cursor:pointer;font-size:14px;transition:all 0.2s}
.btn-settings:hover{color:var(--blue);border-color:var(--blue)}
.drawer{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:#0b1014;border-left:1px solid var(--border);z-index:100;padding:20px;transition:right 0.3s cubic-bezier(0.4,0,0.2,1);overflow-y:auto}
.drawer.open{right:0}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
.drawer-overlay.open{display:block}
.drawer h3{font-family:'Clash Display',sans-serif;font-size:15px;margin-bottom:20px;color:var(--blue)}
.drawer-section{margin-bottom:24px}
.drawer-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.drawer-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;margin-bottom:8px}
.drawer-btn{width:100%;padding:10px;border-radius:6px;border:none;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.2s;margin-bottom:6px}
.drawer-btn-primary{background:var(--blue);color:#fff}
.drawer-btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.drawer-status{font-size:11px;margin-top:6px;min-height:16px}
.drawer-status.ok{color:var(--green)}.drawer-status.err{color:#DC3C2A}
.knowledge-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-size:11px}
.kb-status.loaded{color:var(--green)}.kb-status.missing{color:var(--muted)}
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;gap:4px;animation:msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.user{align-items:flex-end}.msg.ai{align-items:flex-start}
.msg-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 4px}
.bubble{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.65}
.msg.user .bubble{background:rgba(42,168,220,0.13);border:1px solid rgba(42,168,220,0.28);border-radius:16px 16px 4px 16px;color:#c8e8f5}
.msg.ai .bubble{background:var(--card);border:1px solid var(--border);border-radius:16px 16px 16px 4px;color:var(--text)}
.typing{display:flex;gap:5px;align-items:center;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px 16px 16px 4px;width:fit-content}
.typing span{width:6px;height:6px;background:var(--blue);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}
.input-area{position:relative;z-index:10;padding:12px 16px 20px;border-top:1px solid var(--border);background:rgba(8,12,15,0.98);flex-shrink:0}
.suggestions{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;scrollbar-width:none}
.suggestions::-webkit-scrollbar{display:none}
.suggestion{white-space:nowrap;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:'DM Mono',monospace}
.suggestion:hover{border-color:var(--blue);color:var(--blue)}
.input-row{display:flex;gap:10px;align-items:flex-end}
.text-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;resize:none;min-height:46px;max-height:120px;line-height:1.5;transition:border-color 0.2s}
.text-input::placeholder{color:var(--muted)}
.text-input:focus{border-color:rgba(42,168,220,0.4)}
.btn{width:46px;height:46px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.btn-send{background:var(--blue);color:#fff}
.btn-send:disabled{opacity:0.4;cursor:not-allowed}
.btn-voice{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.btn-voice.listening{background:rgba(220,42,42,0.12);border-color:rgba(220,42,42,0.4);color:#DC2A2A;animation:voicePulse 1s infinite}
@keyframes voicePulse{0%,100%{box-shadow:0 0 0 0 rgba(220,42,42,0.3)}50%{box-shadow:0 0 0 8px rgba(220,42,42,0)}}
.voice-status{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;min-height:16px}
.voice-status.active{color:#DC2A2A}
.welcome{text-align:center;padding:40px 20px;animation:fadeIn 0.5s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.welcome-icon{font-size:48px;margin-bottom:16px;display:block}
.welcome h2{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{font-size:12px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <h3>⚙️ Paramètres</h3>
  <div class="drawer-section">
    <div class="drawer-label">Clé API Claude</div>
    <input class="drawer-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-..."/>
    <button class="drawer-btn drawer-btn-primary" onclick="saveApiKey()">Sauvegarder</button>
    <div class="drawer-status" id="keyStatus"></div>
  </div>
  <div class="drawer-section">
    <div class="drawer-label">Knowledge Base</div>
    <div class="knowledge-item"><span>📦 catalogue.json</span><span class="kb-status" id="status-catalogue">⏳</span></div>
    <div class="knowledge-item"><span>🔧 reparations.json</span><span class="kb-status" id="status-reparations">⏳</span></div>
    <button class="drawer-btn drawer-btn-secondary" onclick="reloadKnowledge()">↺ Recharger</button>
    <div class="drawer-status" id="knowledgeStatus"></div>
  </div>
  <div class="drawer-section">
    <button class="drawer-btn drawer-btn-secondary" onclick="clearHistory()">🗑 Vider conversation</button>
  </div>
  <button class="drawer-btn drawer-btn-secondary" onclick="closeDrawer()">✕ Fermer</button>
</div>
<header>
  <div class="logo"><span class="c1">Corner</span><span class="c2">Mobile</span></div>
  <div class="header-right">
    <div class="status"><div class="status-dot" id="statusDot"></div><span id="statusText">Prêt</span></div>
    <button class="btn-settings" onclick="openDrawer()">⚙️</button>
  </div>
</header>
<div class="messages" id="messages">
  <div class="welcome">
    <span class="welcome-icon">📱</span>
    <h2>Assistant Corner Mobile</h2>
    <p>Pose ta question en vocal ou par écrit.<br>Stock · Prix · Réparation — réponse immédiate.</p>
  </div>
</div>
<div class="input-area">
  <div class="suggestions">
    <div class="suggestion" onclick="quickSend('iPhone 13 dispo ?')">iPhone 13 dispo ?</div>
    <div class="suggestion" onclick="quickSend('Prix écran iPhone 12')">Écran iPhone 12</div>
    <div class="suggestion" onclick="quickSend('Batterie Samsung A54 ?')">Batterie A54</div>
    <div class="suggestion" onclick="quickSend('Stock Casa ?')">Stock Casa</div>
    <div class="suggestion" onclick="quickSend('Compare iPhone 11 et 12')">iPhone 11 vs 12</div>
  </div>
  <div class="input-row">
    <textarea class="text-input" id="textInput" placeholder="Écris ou parle..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="btn btn-send" id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="voice-status" id="voiceStatus"></div>
</div>
<script>
let apiKey=localStorage.getItem('cm_api_key')||'';
let isLoading=false,recognition=null,isListening=false;
let conversationHistory=[],catalogue=null,reparations=null;

window.onload=async()=>{
  if(apiKey)document.getElementById('apiKeyInput').value=apiKey;
  await loadKnowledge();
};

function setStatus(text,type){
  const dot=document.getElementById('statusDot');
  const label=document.getElementById('statusText');
  dot.className='status-dot';
  if(type==='loading')dot.classList.add('loading');
  if(type==='error')dot.classList.add('error');
  label.textContent=text;
}

async function loadKnowledge(){
  setStatus('Chargement...','loading');
  let loaded=0;
  try{const r=await fetch('catalogue.json');if(!r.ok)throw 0;catalogue=await r.json();document.getElementById('status-catalogue').textContent='✅';document.getElementById('status-catalogue').className='kb-status loaded';loaded++;}
  catch{document.getElementById('status-catalogue').textContent='❌';document.getElementById('status-catalogue').className='kb-status missing';}
  try{const r=await fetch('reparations.json');if(!r.ok)throw 0;reparations=await r.json();document.getElementById('status-reparations').textContent='✅';document.getElementById('status-reparations').className='kb-status loaded';loaded++;}
  catch{document.getElementById('status-reparations').textContent='❌';document.getElementById('status-reparations').className='kb-status missing';}
  const ks=document.getElementById('knowledgeStatus');
  if(loaded===2){setStatus('Prêt','ok');ks.className='drawer-status ok';ks.textContent='✅ Fichiers chargés';}
  else{setStatus('Prêt','ok');ks.className='drawer-status err';ks.textContent=`⚠️ ${loaded}/2 fichiers — place les JSON dans le même dossier`;}
}

function reloadKnowledge(){catalogue=null;reparations=null;loadKnowledge();}

function buildSystemPrompt(){
  let cat='',rep='';
  if(catalogue){
    const a=catalogue.appareils.filter(x=>x.dispo).map(x=>`${x.modele} ${x.stockage}|${x.etat}|${x.prix} MAD|${x.store}`).join('\n');
    cat=`STOCK:\n${a}`;
  }else{
    cat='STOCK:\niPhone 13 128GB|Très bon|4200 MAD|Rabat\niPhone 12 128GB|Très bon|3200 MAD|Rabat\nSamsung A54 128GB|Neuf|2600 MAD|Rabat';
  }
  if(reparations){
    const lines=[];
    for(const[k,v]of Object.entries(reparations.reparations)){
      if(v.escalade){lines.push(`${v.label}: diagnostic spécialisé`);}
      else if(v.prix_min!==undefined){lines.push(`${v.label}: ${v.prix_min}–${v.prix_max} MAD`);}
      else if(v.marques){for(const[m,d]of Object.entries(v.marques)){const arr=Array.isArray(d)?d:(d.modeles||[]);arr.forEach(x=>{if(!x.escalade)lines.push(`${v.label} ${m} ${x.groupe}: ${x.prix_min}–${x.prix_max} MAD`);});}}
    }
    rep=`RÉPARATIONS:\n${lines.join('\n')}`;
  }else{
    rep='RÉPARATIONS:\nÉcran iPhone 12/13: 550–750 MAD\nBatterie iPhone: 150–380 MAD\nÉcran Samsung A: 280–550 MAD';
  }
  return `Tu es l'assistant interne de Corner Mobile, boutique smartphones Rabat et Casablanca.
Tu réponds aux vendeurs face à un client — réponses ultra courtes, max 3 lignes.
Détecte la langue (FR/Darija/AR) et réponds dans la même langue.
${cat}\n${rep}
LIVRAISON: Rabat et Casa uniquement. Diagnostic: Gratuit.
Format stock dispo: "✅ Oui — modèle | prix MAD | état | ville"
Format indispo: "❌ Pas en stock"
Format répa: fourchette + "après diagnostic"`;
}

function saveApiKey(){
  const v=document.getElementById('apiKeyInput').value.trim();
  const ks=document.getElementById('keyStatus');
  if(v.startsWith('sk-ant')){apiKey=v;localStorage.setItem('cm_api_key',v);ks.className='drawer-status ok';ks.textContent='✅ Clé sauvegardée';setStatus('Prêt','ok');}
  else{ks.className='drawer-status err';ks.textContent='❌ Format invalide';}
}

function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
function clearHistory(){conversationHistory=[];document.getElementById('messages').innerHTML='<div class="welcome"><span class="welcome-icon">📱</span><h2>Assistant Corner Mobile</h2><p>Conversation réinitialisée.</p></div>';closeDrawer();}

function addMessage(role,text){
  const c=document.getElementById('messages');
  const w=c.querySelector('.welcome');if(w)w.remove();
  const msg=document.createElement('div');msg.className=`msg ${role}`;
  const label=document.createElement('div');label.className='msg-label';label.textContent=role==='user'?'Vendeur':'Assistant';
  const bubble=document.createElement('div');bubble.className='bubble';
  bubble.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/(\d{3,5}\s*MAD)/g,'<strong style="color:var(--blue)">$1</strong>').replace(/✅/g,'<span style="color:var(--green)">✅</span>').replace(/❌/g,'<span style="color:#DC3C2A">❌</span>').replace(/\n/g,'<br>');
  msg.appendChild(label);msg.appendChild(bubble);c.appendChild(msg);c.scrollTop=c.scrollHeight;
}

function showTyping(){
  const c=document.getElementById('messages');
  const t=document.createElement('div');t.className='msg ai';t.id='typing';
  t.innerHTML='<div class="msg-label">Assistant</div><div class="typing"><span></span><span></span><span></span></div>';
  c.appendChild(t);c.scrollTop=c.scrollHeight;
}

function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function sendMessage(text){
  const input=document.getElementById('textInput');
  const msg=text||input.value.trim();
  if(!msg||isLoading)return;
  if(!apiKey){openDrawer();return;}
  input.value='';autoResize(input);
  isLoading=true;document.getElementById('sendBtn').disabled=true;
  setStatus('Réflexion...','loading');
  addMessage('user',msg);
  conversationHistory.push({role:'user',content:msg});
  showTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:buildSystemPrompt(),messages:conversationHistory})
    });
    const data=await res.json();removeTyping();
    if(data.error){addMessage('ai',`❌ ${data.error.message}`);setStatus('Erreur','error');}
    else{
      const reply=data.content[0].text;
      conversationHistory.push({role:'assistant',content:reply});
      if(conversationHistory.length>20)conversationHistory=conversationHistory.slice(-16);
      addMessage('ai',reply);setStatus('Prêt','ok');
    }
  }catch(e){removeTyping();addMessage('ai','❌ Connexion impossible');setStatus('Erreur','error');}
  isLoading=false;document.getElementById('sendBtn').disabled=false;
}

function quickSend(t){document.getElementById('textInput').value=t;sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function toggleVoice(){isListening?stopVoice():startVoice();}
function startVoice(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){document.getElementById('voiceStatus').textContent='⚠️ Vocal non supporté';return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='fr-FR';recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{isListening=true;document.getElementById('voiceBtn').classList.add('listening');document.getElementById('voiceStatus').textContent="🎙️ J'écoute...";document.getElementById('voiceStatus').classList.add('active');};
  recognition.onresult=(e)=>{const t=Array.from(e.results).map(r=>r[0].transcript).join('');document.getElementById('textInput').value=t;if(e.results[0].isFinal){stopVoice();sendMessage();}};
  recognition.onerror=()=>stopVoice();recognition.onend=()=>stopVoice();
  recognition.start();
}
function stopVoice(){isListening=false;if(recognition)recognition.stop();document.getElementById('voiceBtn').classList.remove('listening');document.getElementById('voiceStatus').textContent='';document.getElementById('voiceStatus').classList.remove('active');}
</script>
</body>
</html>
